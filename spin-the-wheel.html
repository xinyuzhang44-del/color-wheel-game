<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Color Wheel — Learn Your Colors!</title>
<style>
  :root{
    --red:#e53935;
    --green:#43a047;
    --blue:#1e88e5;
    --yellow:#fdd835;
    --ink:#2b2540;
    --paper:#fffdf7;
    --cloud:#f2eefb;
    --shadow: 0 10px 24px rgba(43,37,64,0.18);
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    background: radial-gradient(circle at 20% 10%, #fff7e0 0%, #eaf3ff 45%, #f4ecff 100%);
    font-family: "Nunito", "Segoe UI Rounded", "Segoe UI", "Trebuchet MS", Verdana, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
  }

  .page{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: clamp(14px, 3vw, 32px);
    gap: clamp(10px, 2vw, 18px);
  }

  header{
    text-align:center;
    max-width: 720px;
  }

  h1{
    margin: 0 0 6px 0;
    font-size: clamp(1.6rem, 4.5vw, 2.6rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--red), var(--yellow) 35%, var(--green) 65%, var(--blue));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .instructions{
    margin:0;
    font-size: clamp(0.95rem, 2.2vw, 1.15rem);
    color: #55507a;
    font-weight: 600;
  }

  .topbar{
    width:100%;
    max-width: 720px;
    display:flex;
    justify-content: space-between;
    align-items:center;
  }

  .back-link{
    text-decoration:none;
    font-weight:800;
    font-size: clamp(0.85rem, 2vw, 1rem);
    color:#6b6690;
    background: var(--paper);
    border: 2px solid #d8d2f5;
    border-radius: 999px;
    padding: 8px 16px;
    box-shadow: var(--shadow);
    transition: transform 0.08s ease;
  }
  .back-link:active{ transform: translateY(2px); }

  .streak{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background: var(--paper);
    border: 3px solid #ffdd6b;
    border-radius: 999px;
    padding: 8px 18px;
    font-weight: 800;
    font-size: clamp(0.95rem, 2.4vw, 1.2rem);
    box-shadow: var(--shadow);
  }

  .streak .star-icon{
    font-size: 1.3em;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.15));
  }

  main{
    width:100%;
    max-width: 720px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: clamp(14px, 3vw, 26px);
  }

  /* ---------- Wheel ---------- */

  .wheel-zone{
    position:relative;
    width: clamp(230px, 62vw, 380px);
    height: clamp(230px, 62vw, 380px);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .pointer{
    position:absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 34px solid #2b2540;
    z-index: 5;
    filter: drop-shadow(0 4px 4px rgba(0,0,0,0.25));
  }
  .pointer::after{
    content:"";
    position:absolute;
    top: -34px;
    left: -14px;
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 24px solid #ffffff;
  }

  .wheel-outer{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
    padding: 10px;
    background: linear-gradient(145deg,#fff, #e7e2fb);
    box-shadow: var(--shadow), inset 0 0 0 2px rgba(255,255,255,0.6);
  }

  .wheel{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
    background: conic-gradient(
      var(--red) 0deg 90deg,
      var(--yellow) 90deg 180deg,
      var(--green) 180deg 270deg,
      var(--blue) 270deg 360deg
    );
    box-shadow: 0 0 0 6px #ffffff, 0 0 0 9px rgba(43,37,64,0.12);
    will-change: transform;
  }

  /* divider lines drawn at each 90deg boundary */
  .wheel::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    background: repeating-conic-gradient(
      from 0deg,
      transparent 0deg 89.3deg,
      rgba(255,255,255,0.95) 89.3deg 90.7deg
    );
    pointer-events:none;
  }

  .wheel-hub{
    position:absolute;
    top:50%; left:50%;
    transform: translate(-50%,-50%);
    width: 22%;
    height: 22%;
    border-radius:50%;
    background: var(--paper);
    box-shadow: 0 0 0 5px #fff, 0 4px 10px rgba(0,0,0,0.25);
    z-index: 3;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
  }

  /* ---------- Spin button ---------- */

  .spin-btn{
    appearance:none;
    border:none;
    cursor:pointer;
    min-width: 240px;
    min-height: 72px;
    padding: 14px 36px;
    border-radius: 999px;
    font-family: inherit;
    font-weight: 900;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    letter-spacing: 0.02em;
    color: #fff;
    background: linear-gradient(160deg, #7c5cff, #5b3df0);
    box-shadow: 0 8px 0 #4327b8, var(--shadow);
    transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.2s ease;
  }
  .spin-btn:hover{ filter: brightness(1.06); }
  .spin-btn:active{
    transform: translateY(6px);
    box-shadow: 0 2px 0 #4327b8, var(--shadow);
  }
  .spin-btn:disabled{
    cursor: default;
    filter: grayscale(0.15) brightness(0.95);
    transform: none;
    box-shadow: 0 8px 0 #4327b8, var(--shadow);
    opacity: 0.85;
  }
  .spin-btn.next-mode{
    background: linear-gradient(160deg, #ff9a3d, #ff6a3d);
    box-shadow: 0 8px 0 #c9491a, var(--shadow);
  }
  .spin-btn.next-mode:active{ box-shadow: 0 2px 0 #c9491a, var(--shadow); }

  .state-label{
    min-height: 1.4em;
    font-weight: 800;
    font-size: clamp(0.9rem, 2.2vw, 1.05rem);
    color: #6b6690;
    text-align:center;
  }

  /* ---------- Flashcard / result panel ---------- */

  .flashcard{
    position:relative;
    width:100%;
    max-width: 420px;
    background: var(--paper);
    border-radius: 28px;
    box-shadow: var(--shadow);
    padding: clamp(16px, 4vw, 28px);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 14px;
    opacity:0;
    transform: scale(0.85);
    pointer-events:none;
    transition: opacity 0.18s ease, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  .flashcard.visible{
    opacity:1;
    transform: scale(1);
    pointer-events:auto;
  }

  .flashcard .icon-frame{
    width: clamp(130px, 34vw, 190px);
    height: clamp(130px, 34vw, 190px);
    border-radius: 24px;
    display:flex;
    align-items:center;
    justify-content:center;
    background: var(--cloud);
    border: 4px solid #fff;
    box-shadow: inset 0 0 0 2px rgba(43,37,64,0.06);
  }
  .flashcard .icon-frame svg{
    width: 78%;
    height: 78%;
  }

  .say-it{
    margin:0;
    font-weight: 800;
    font-size: clamp(1rem, 2.6vw, 1.25rem);
    color: #55507a;
    text-align:center;
  }

  .answer-btn{
    appearance:none;
    border: none;
    cursor:pointer;
    min-height: 58px;
    padding: 10px 28px;
    border-radius: 999px;
    font-family: inherit;
    font-weight: 800;
    font-size: clamp(1rem, 2.6vw, 1.2rem);
    background: var(--paper);
    color: var(--ink);
    border: 3px solid #d8d2f5;
    box-shadow: 0 5px 0 #d8d2f5;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .answer-btn:active{
    transform: translateY(4px);
    box-shadow: 0 1px 0 #d8d2f5;
  }

  .answer-reveal{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 6px;
    min-height: 0;
    max-height: 0;
    overflow:hidden;
    opacity:0;
    transition: max-height 0.35s ease, opacity 0.35s ease;
  }
  .answer-reveal.shown{
    max-height: 200px;
    opacity:1;
  }

  .color-name{
    margin:0;
    font-weight: 900;
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    text-transform: capitalize;
    text-shadow: 0 2px 0 rgba(0,0,0,0.06);
  }
  .color-name.c-red{ color: var(--red); }
  .color-name.c-green{ color: var(--green); }
  .color-name.c-blue{ color: var(--blue); }
  .color-name.c-yellow{ color: #d0a900; }

  .great-job{
    margin:0;
    font-weight: 800;
    font-size: clamp(1rem, 2.8vw, 1.3rem);
    color: #ff6a3d;
  }

  footer{
    margin-top: auto;
    padding-top: 10px;
    font-size: 0.8rem;
    color: #9a94bd;
    text-align:center;
  }

  /* ---------- Confetti ---------- */

  .confetti-layer{
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 999;
  }
  .confetti-piece{
    position:absolute;
    top: -20px;
    width: 10px;
    height: 14px;
    opacity: 0.95;
    animation-name: confetti-fall;
    animation-timing-function: cubic-bezier(0.4,0.1,0.6,0.9);
    animation-fill-mode: forwards;
  }
  @keyframes confetti-fall{
    0%{
      transform: translate(0,0) rotate(0deg);
      opacity: 1;
    }
    100%{
      transform: translate(var(--tx), var(--ty)) rotate(var(--rot));
      opacity: 0;
    }
  }

  @media (max-width: 420px){
    .spin-btn{ min-width: 0; width: 100%; }
  }

  @media (prefers-color-scheme: dark){
    html,body{
      background: radial-gradient(circle at 20% 10%, #241f38 0%, #1b1730 55%, #171326 100%);
      color: #f2eefb;
    }
    .instructions{ color: #c9c3ea; }
    .streak{ background:#241f38; color:#f2eefb; border-color:#7a5cff; }
    .state-label{ color:#b6aee0; }
    .wheel-outer{ background: linear-gradient(145deg,#2b2540,#3a3260); }
    .wheel-hub{ background:#241f38; }
    .flashcard{ background:#241f38; color:#f2eefb; }
    .flashcard .icon-frame{ background:#332c52; border-color:#241f38; }
    .say-it{ color:#c9c3ea; }
    .answer-btn{ background:#241f38; color:#f2eefb; border-color:#443a6e; box-shadow:0 5px 0 #443a6e; }
    .answer-btn:active{ box-shadow:0 1px 0 #443a6e; }
    .back-link{ background:#241f38; color:#f2eefb; border-color:#443a6e; }
    footer{ color:#7a7399; }
  }

  :root[data-theme="dark"] html,
  :root[data-theme="dark"] body{
    background: radial-gradient(circle at 20% 10%, #241f38 0%, #1b1730 55%, #171326 100%);
    color: #f2eefb;
  }
  :root[data-theme="dark"] .instructions{ color: #c9c3ea; }
  :root[data-theme="dark"] .streak{ background:#241f38; color:#f2eefb; border-color:#7a5cff; }
  :root[data-theme="dark"] .state-label{ color:#b6aee0; }
  :root[data-theme="dark"] .wheel-outer{ background: linear-gradient(145deg,#2b2540,#3a3260); }
  :root[data-theme="dark"] .wheel-hub{ background:#241f38; }
  :root[data-theme="dark"] .flashcard{ background:#241f38; color:#f2eefb; }
  :root[data-theme="dark"] .flashcard .icon-frame{ background:#332c52; border-color:#241f38; }
  :root[data-theme="dark"] .say-it{ color:#c9c3ea; }
  :root[data-theme="dark"] .answer-btn{ background:#241f38; color:#f2eefb; border-color:#443a6e; box-shadow:0 5px 0 #443a6e; }
  :root[data-theme="dark"] .answer-btn:active{ box-shadow:0 1px 0 #443a6e; }
  :root[data-theme="dark"] .back-link{ background:#241f38; color:#f2eefb; border-color:#443a6e; }
  :root[data-theme="dark"] footer{ color:#7a7399; }

  :root[data-theme="light"] html,
  :root[data-theme="light"] body{
    background: radial-gradient(circle at 20% 10%, #fff7e0 0%, #eaf3ff 45%, #f4ecff 100%);
    color: var(--ink);
  }
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <a class="back-link" href="index.html">&larr; Games</a>
    <div class="streak"><span class="star-icon">⭐</span><span id="streakCount">0</span></div>
  </div>

  <header>
    <h1>Color Wheel — Learn Your Colors!</h1>
    <p class="instructions">Spin the wheel, look at the picture, and say the color out loud!</p>
  </header>

  <main>
    <div class="wheel-zone">
      <div class="pointer" aria-hidden="true"></div>
      <div class="wheel-outer">
        <div class="wheel" id="wheel"></div>
        <div class="wheel-hub" aria-hidden="true">🎨</div>
      </div>
    </div>

    <p class="state-label" id="stateLabel">Ready when you are!</p>

    <button class="spin-btn" id="spinBtn">SPIN THE WHEEL!</button>

    <section class="flashcard" id="flashcard" aria-live="polite">
      <div class="icon-frame" id="iconFrame"></div>
      <p class="say-it">Say the color out loud!</p>
      <button class="answer-btn" id="answerBtn">Show Answer</button>
      <div class="answer-reveal" id="answerReveal">
        <p class="color-name" id="colorName"></p>
        <p class="great-job" id="greatJob"></p>
      </div>
    </section>
  </main>

  <footer>Made for little learners &middot; practice makes perfect &middot; no wrong answers here!</footer>
</div>

      // Whale
      `<svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
        <path d="M18,85 C18,55 48,38 78,40 C108,42 128,58 130,75 C131,80 128,83 122,82 C124,90 118,96 108,93 L112,105 L96,96 C80,112 40,110 25,95 C18,88 18,90 18,85 Z" fill="#1e88e5"/>
        <path d="M28,88 C40,98 70,100 90,90" fill="none" stroke="#64b5f6" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
        <circle cx="45" cy="65" r="5" fill="#212121"/>
        <circle cx="55" cy="42" r="4" fill="#1565c0"/>
        <path d="M55,38 C52,26 52,20 55,12 M55,38 C58,28 62,24 66,18" fill="none" stroke="#90caf9" stroke-width="5" stroke-linecap="round"/>
      </svg>`
    ],
    yellow: [
      // Sun
      `<svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
        <g fill="#fdd835" stroke="#f9a825" stroke-width="3" stroke-linejoin="round">
          <polygon points="75,8 82,32 68,32"/>
          <polygon points="75,142 82,118 68,118"/>
          <polygon points="8,75 32,68 32,82"/>
          <polygon points="142,75 118,82 118,68"/>
          <polygon points="27,27 47,38 38,47"/>
          <polygon points="123,27 112,47 103,38"/>
          <polygon points="27,123 38,103 47,112"/>
          <polygon points="123,123 103,112 112,103"/>
        </g>
        <circle cx="75" cy="75" r="38" fill="#fdd835" stroke="#f9a825" stroke-width="3"/>
        <circle cx="63" cy="70" r="4.5" fill="#8d6e00"/>
        <circle cx="87" cy="70" r="4.5" fill="#8d6e00"/>
        <path d="M60,85 Q75,96 90,85" fill="none" stroke="#8d6e00" stroke-width="4" stroke-linecap="round"/>
      </svg>`,
      // Banana
      `<svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
        <path d="M42,118 C24,90 28,52 58,28 C74,15 92,14 100,22 C88,24 74,32 63,46 C48,66 46,90 56,112 C60,120 68,126 78,127 C68,133 50,132 42,118 Z" fill="#fdd835" stroke="#6d4c25" stroke-width="3.5" stroke-linejoin="round"/>
        <ellipse cx="96" cy="22" rx="8" ry="6" fill="#6d4c25" transform="rotate(30 96 22)"/>
        <ellipse cx="45" cy="120" rx="9" ry="7" fill="#8d6e00" transform="rotate(-30 45 120)"/>
        <path d="M62,42 C50,60 48,84 57,105" fill="none" stroke="#f9a825" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
      </svg>`,
      // Lemon
      `<svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="75" cy="78" rx="47" ry="36" fill="#fdd835" stroke="#f9a825" stroke-width="3.5"/>
        <ellipse cx="25" cy="78" rx="9" ry="7" fill="#f9a825"/>
        <ellipse cx="125" cy="78" rx="9" ry="7" fill="#f9a825"/>

        <ellipse cx="134" cy="34" rx="10" ry="6" fill="#43a047" transform="rotate(20 134 34)"/>
        <ellipse cx="60" cy="60" rx="12" ry="20" fill="#ffffff" opacity="0.25" transform="rotate(-15 60 60)"/>

  // ============================================================ end ICON_SET_PLACEHOLDER

  const COLOR_ORDER = ['red', 'yellow', 'green', 'blue']; // must match the conic-gradient stops in CSS (.wheel)
  const SEGMENT_SIZE = 360 / COLOR_ORDER.length;
  const ENCOURAGEMENTS = ['Great job!', 'Awesome!', 'You got it!', 'Super star!', 'Nice work!', 'Way to go!'];

  const wheelEl = document.getElementById('wheel');
  const spinBtn = document.getElementById('spinBtn');
  const stateLabel = document.getElementById('stateLabel');
  const flashcard = document.getElementById('flashcard');
  const iconFrame = document.getElementById('iconFrame');
  const answerBtn = document.getElementById('answerBtn');
  const answerReveal = document.getElementById('answerReveal');
  const colorNameEl = document.getElementById('colorName');
  const greatJobEl = document.getElementById('greatJob');
  const streakCountEl = document.getElementById('streakCount');

  let currentRotation = 0;
  let isSpinning = false;
  let streak = 0;
  let currentWinner = null;
  let fallbackTimer = null;

  function pickWinnerAndRotation() {
    const idx = Math.floor(Math.random() * COLOR_ORDER.length);
    const winner = COLOR_ORDER[idx];
    const segStart = idx * SEGMENT_SIZE;

    // land somewhere inside the segment, avoiding the very edges so it visually
    // reads as a clean, unambiguous landing spot
    const pad = SEGMENT_SIZE * 0.12;
    const targetAngleInSegment = segStart + pad + Math.random() * (SEGMENT_SIZE - 2 * pad);

    // rotating the wheel clockwise by R moves the point originally at angle a
    // to angle (a + R) mod 360. The pointer is fixed at angle 0 (top), so we
    // need (targetAngleInSegment + R) mod 360 === 0.
    const rBase = (360 - targetAngleInSegment) % 360;

    const fullSpins = 5 + Math.floor(Math.random() * 3); // 5–7 extra full rotations
    const currentMod = ((currentRotation % 360) + 360) % 360;
    const delta = ((rBase - currentMod) + 360) % 360;
    const newRotation = currentRotation + fullSpins * 360 + delta;

    return { winner, newRotation };
  }

  function resetForNextRound() {
    flashcard.classList.remove('visible');
    answerReveal.classList.remove('shown');
    answerBtn.textContent = 'Show Answer';
    colorNameEl.textContent = '';
    greatJobEl.textContent = '';
  }

  function startSpin() {
    if (isSpinning) return;
    isSpinning = true;
    resetForNextRound();

    spinBtn.disabled = true;
    spinBtn.classList.remove('next-mode');
    spinBtn.textContent = 'Spinning…';
    stateLabel.textContent = 'Round in progress — watch it go!';

    const { winner, newRotation } = pickWinnerAndRotation();
    currentWinner = winner;
    currentRotation = newRotation;

    const duration = 2.5 + Math.random() * 1.0; // 2.5s – 3.5s
    wheelEl.style.transition = `transform ${duration.toFixed(2)}s cubic-bezier(0.12, 0.72, 0.18, 1)`;
    wheelEl.style.transform = `rotate(${currentRotation}deg)`;

    const onDone = () => {
      wheelEl.removeEventListener('transitionend', handler);
      clearTimeout(fallbackTimer);
      revealResult(winner);
    };
    const handler = (e) => {
      if (e.propertyName === 'transform') onDone();
    };
    wheelEl.addEventListener('transitionend', handler);
    // safety net in case transitionend doesn't fire in some browser edge case
    fallbackTimer = setTimeout(onDone, duration * 1000 + 150);
  }

  function revealResult(winner) {
    isSpinning = false;

    // instant, no-delay reveal the moment the wheel stops
    const icons = ICONS[winner] || [];
    const pick = icons.length ? icons[Math.floor(Math.random() * icons.length)] : '';
    iconFrame.innerHTML = pick;

    flashcard.classList.add('visible');
    stateLabel.textContent = 'Round result — say the color out loud!';

    streak += 1;
    streakCountEl.textContent = String(streak);

    spinBtn.disabled = false;
    spinBtn.classList.add('next-mode');
    spinBtn.textContent = 'NEXT SPIN →';
  }

  function toggleAnswer() {
    const showing = answerReveal.classList.contains('shown');
    if (showing) {
      answerReveal.classList.remove('shown');
      answerBtn.textContent = 'Show Answer';
      return;
    }
    colorNameEl.textContent = currentWinner;
    colorNameEl.className = 'color-name c-' + currentWinner;
    greatJobEl.textContent = ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)];
    answerReveal.classList.add('shown');
    answerBtn.textContent = 'Hide Answer';
    burstConfetti();
  }

  function burstConfetti() {
    const layer = document.createElement('div');
    layer.className = 'confetti-layer';
    document.body.appendChild(layer);

    const colors = ['#e53935', '#43a047', '#1e88e5', '#fdd835', '#ff6a3d', '#7c5cff'];
    const originX = window.innerWidth / 2;
    const pieceCount = 42;

    for (let i = 0; i < pieceCount; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const color = colors[Math.floor(Math.random() * colors.length)];
      const isCircle = Math.random() > 0.5;
      piece.style.background = color;
      piece.style.borderRadius = isCircle ? '50%' : '2px';
      piece.style.left = (originX + (Math.random() * 260 - 130)) + 'px';

      const tx = (Math.random() * 300 - 150) + 'px';
      const ty = (window.innerHeight * (0.5 + Math.random() * 0.5)) + 'px';
      const rot = (Math.random() * 720 - 360) + 'deg';
      piece.style.setProperty('--tx', tx);
      piece.style.setProperty('--ty', ty);
      piece.style.setProperty('--rot', rot);

      const dur = 1.1 + Math.random() * 0.9;
      piece.style.animationDuration = dur.toFixed(2) + 's';
      piece.style.animationDelay = (Math.random() * 0.15) + 's';

      layer.appendChild(piece);
    }

    setTimeout(() => layer.remove(), 2400);
  }

  spinBtn.addEventListener('click', startSpin);
  answerBtn.addEventListener('click', toggleAnswer);
</script>
